name: Build Web

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/build-web.yml'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build
        working-directory: web
        run: npm run build
